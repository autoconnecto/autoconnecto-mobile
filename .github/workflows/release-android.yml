name: Android APK (release)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Capacitor sync Android
        run: npx cap sync android

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK for release
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
            "autoconnecto-mobile-${GITHUB_REF_NAME}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: autoconnecto-mobile-release-apk
          path: autoconnecto-mobile-*.apk

      - name: Create GitHub Release (tag pushes)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: autoconnecto-mobile-*.apk
          name: Autoconnecto Mobile ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          body: |
            ## Autoconnecto Mobile ${{ github.ref_name }}

            Android APK for field monitoring: live telemetry and alarms (ack/clear).

            ### Install on your phone
            1. Download **`autoconnecto-mobile-*.apk`** (not a `.zip`).
            2. Open **Files** or **Downloads** and tap the APK (Chrome’s download chip often does not install).
            3. Allow **Install unknown apps** for Files/Chrome if prompted.
            4. If Play Protect warns, tap **Install anyway** / **More details** → **Install anyway**.
            5. Sign in with the same account as [app.autoconnecto.in](https://app.autoconnecto.in).

            **API:** production (`api.autoconnecto.in`).
