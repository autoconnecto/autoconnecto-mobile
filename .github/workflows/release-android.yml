name: Android APK (debug)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Capacitor sync Android
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: autoconnecto-mobile-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release (tag pushes)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: Autoconnecto Mobile ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          body: |
            ## Autoconnecto Mobile ${{ github.ref_name }}

            Android debug APK for field monitoring: live telemetry and alarms (ack/clear).

            **Install:** download `app-debug.apk`, allow installs from unknown sources, open the APK.

            **Sign-in:** same Cognito account as [app.autoconnecto.in](https://app.autoconnecto.in).

            **API:** production (`api.autoconnecto.in`).
